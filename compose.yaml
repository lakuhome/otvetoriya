services:
  db:
    image: postgres:16-alpine
    container_name: otvetoriya-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quiz_room}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./server
    container_name: otvetoriya-server
    restart: unless-stopped
    environment:
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-replace_with_long_random_string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-quiz_room}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  client:
    build:
      context: ./client
    container_name: otvetoriya-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data:
